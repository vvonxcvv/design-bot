<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignHub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, 'Pretendard', sans-serif; }

    :root {
      --bg-base: #0E0F12;
      --bg-surface: #13151A;
      --bg-card: #1C1F27;
      --border-color: #1E2026;
      --border-soft: #2A2D35;
      --accent: #4A7CFF;
      --accent-dim: #1A2744;
      --accent-border: #2A3C6A;
      --text-1: #F2F4F8;
      --text-2: #8B90A0;
      --text-3: #4D5266;
      --text-4: #3D4255;
    }

    html, body { height: 100%; background: var(--bg-base); color: var(--text-1); }

    .wrap { height: 100vh; display: flex; flex-direction: column; }

    /* Topbar */
    .topbar { height: 52px; min-height: 52px; background: var(--bg-surface); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
    .logo { font-size: 15px; font-weight: 600; color: var(--text-1); display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 26px; height: 26px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; }
    .logo-icon i { font-size: 14px; color: #fff; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .topbar-btn { border: 1px solid var(--border-soft); background: var(--bg-card); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .topbar-btn i { font-size: 14px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--accent); }

    /* Body */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 210px; min-width: 210px; background: var(--bg-surface); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 16px 0; overflow-y: auto; }
    .sidebar-section { padding: 0 12px; margin-bottom: 20px; }
    .sidebar-label { font-size: 10px; font-weight: 600; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; padding: 0 8px; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; color: var(--text-3); cursor: pointer; margin-bottom: 1px; }
    .menu-item i { font-size: 16px; }
    .menu-item:hover { background: var(--bg-card); color: var(--text-2); }
    .menu-item.active { background: var(--accent-dim); color: var(--accent); }
    .menu-count { margin-left: auto; font-size: 10px; background: var(--border-color); padding: 1px 7px; border-radius: 20px; color: var(--text-4); border: 1px solid var(--border-soft); }
    .divider { height: 1px; background: var(--border-color); margin: 4px 12px 16px; }
    .chip { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 6px 10px; border-radius: 20px; border: 1px solid var(--border-soft); color: var(--text-3); margin-bottom: 5px; cursor: pointer; }
    .chip.on { border-color: var(--accent-border); background: var(--accent-dim); color: var(--accent); }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Content */
    .content { flex: 1; overflow-y: auto; background: var(--bg-base); padding: 24px; }
    .upload-zone { border: 1.5px dashed var(--border-soft); border-radius: 12px; padding: 32px; text-align: center; margin-bottom: 24px; background: var(--bg-surface); }
    .upload-zone i { font-size: 32px; color: var(--text-4); margin-bottom: 10px; display: block; }
    .upload-zone p { font-size: 13px; color: var(--text-2); }
    .upload-zone span { font-size: 11px; color: var(--text-4); display: block; margin-top: 4px; }
    .upload-btn { margin-top: 14px; padding: 7px 18px; border-radius: 8px; border: 1px solid var(--accent-border); background: var(--accent-dim); color: var(--accent); font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .upload-btn i { font-size: 14px; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: var(--border-soft); }
    .card-thumb { width: 100%; height: 85px; background: var(--bg-base); border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
    .card-thumb i { font-size: 26px; color: var(--border-soft); }
    .card-title { font-size: 12px; font-weight: 500; color: var(--text-1); margin-bottom: 3px; }
    .card-sub { font-size: 11px; color: var(--text-3); }
    .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }
    .badge-blue { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
    .badge-green { background: #0D1F17; color: #34D399; border: 1px solid #1A3D2B; }

    /* 색상 패널 */
    .color-panel { width: 240px; min-width: 240px; background: var(--bg-surface); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text-1); display: flex; align-items: center; gap: 6px; }
    .panel-title i { font-size: 15px; color: var(--accent); }
    .color-group { margin-bottom: 18px; }
    .color-group-label { font-size: 10px; font-weight: 600; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .color-row-label { font-size: 12px; color: var(--text-2); }
    .color-input-wrap { display: flex; align-items: center; gap: 7px; }
    .color-hex { font-size: 11px; color: var(--text-3); font-family: monospace; background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 6px; padding: 3px 7px; width: 72px; }
    input[type=color] { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border-soft); cursor: pointer; padding: 1px; background: var(--bg-card); }
    .preset-label { font-size: 10px; font-weight: 600; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
    .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .preset { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
    .preset.selected { border-color: #fff; }
    .preset i { font-size: 14px; color: rgba(255,255,255,0.85); }
    .panel-divider { height: 1px; background: var(--border-color); margin: 0 0 16px; }
    .reset-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border-soft); background: transparent; color: var(--text-2); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: auto; }
    .reset-btn i { font-size: 14px; }
  </style>
</head>
<body>
<div class="wrap" id="app">

  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-layout-grid"></i></div>
      DesignHub
    </div>
    <div class="topbar-right">
      <div class="topbar-btn"><i class="ti ti-search"></i> 검색</div>
      <div class="topbar-btn"><i class="ti ti-bell"></i></div>
      <div class="avatar">JK</div>
    </div>
  </div>

  <div class="body">

    <!-- 왼쪽 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">메뉴</div>
        <div class="menu-item active"><i class="ti ti-home"></i> 홈</div>
        <div class="menu-item"><i class="ti ti-upload"></i> 업로드</div>
        <div class="menu-item"><i class="ti ti-layout-grid"></i> 갤러리 <span class="menu-count">12</span></div>
        <div class="menu-item"><i class="ti ti-sparkles"></i> AI 추천 <span class="menu-count">3</span></div>
        <div class="menu-item"><i class="ti ti-settings"></i> 설정</div>
      </div>
      <div class="divider"></div>
      <div class="sidebar-section">
        <div class="sidebar-label">카테고리</div>
        <div class="chip on"><span class="dot" style="background:var(--accent)"></span> 전체</div>
        <div class="chip"><span class="dot" style="background:#34D399"></span> 기업 제안서</div>
        <div class="chip"><span class="dot" style="background:#FBBF24"></span> 마케팅</div>
        <div class="chip"><span class="dot" style="background:#F472B6"></span> 투자 계획</div>
      </div>
    </div>

    <!-- 메인 콘텐츠 -->
    <div class="content">
      <div class="upload-zone">
        <i class="ti ti-cloud-upload"></i>
        <p>제안서 디자인을 업로드하세요</p>
        <span>PNG, JPG, PDF 지원 · 최대 20MB</span>
        <div class="upload-btn"><i class="ti ti-upload"></i> 파일 선택</div>
      </div>
      <div class="section-label">최근 업로드</div>
      <div class="card-grid">
        <div class="card">
          <div class="card-thumb"><i class="ti ti-file-description"></i></div>
          <div class="card-title">2024 기업 제안서</div>
          <div class="card-sub">2일 전</div>
          <span class="badge badge-green">분석 완료</span>
        </div>
        <div class="card">
          <div class="card-thumb"><i class="ti ti-file-description"></i></div>
          <div class="card-title">마케팅 프레젠테이션</div>
          <div class="card-sub">5일 전</div>
          <span class="badge badge-blue">추천 보기</span>
        </div>
        <div class="card">
          <div class="card-thumb"><i class="ti ti-file-description"></i></div>
          <div class="card-title">투자 계획서</div>
          <div class="card-sub">1주 전</div>
          <span class="badge badge-green">분석 완료</span>
        </div>
      </div>
    </div>

    <!-- 색상 커스터마이즈 패널 -->
    <div class="color-panel">
      <div class="panel-header">
        <div class="panel-title"><i class="ti ti-palette"></i> 색상 커스터마이즈</div>
      </div>
      <div class="preset-label">프리셋</div>
      <div class="preset-row">
        <div class="preset selected" style="background:#4A7CFF" id="preset-toss" onclick="applyPreset('toss')"><i class="ti ti-check"></i></div>
        <div class="preset" style="background:#8B5CF6" id="preset-purple" onclick="applyPreset('purple')"></div>
        <div class="preset" style="background:#10B981" id="preset-emerald" onclick="applyPreset('emerald')"></div>
        <div class="preset" style="background:#F59E0B" id="preset-amber" onclick="applyPreset('amber')"></div>
        <div class="preset" style="background:#EF4444" id="preset-red" onclick="applyPreset('red')"></div>
        <div class="preset" style="background:#EC4899" id="preset-pink" onclick="applyPreset('pink')"></div>
      </div>
      <div class="panel-divider"></div>
      <div class="color-group">
        <div class="color-group-label">배경</div>
        <div class="color-row">
          <span class="color-row-label">기본 배경</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-bg">#0E0F12</span>
            <input type="color" id="pick-bg" value="#0E0F12" oninput="setCSSVar('--bg-base', this.value); updateHex('hex-bg', this.value)">
          </div>
        </div>
        <div class="color-row">
          <span class="color-row-label">서피스</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-surface">#13151A</span>
            <input type="color" id="pick-surface" value="#13151A" oninput="setCSSVar('--bg-surface', this.value); updateHex('hex-surface', this.value)">
          </div>
        </div>
        <div class="color-row">
          <span class="color-row-label">카드</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-card">#1C1F27</span>
            <input type="color" id="pick-card" value="#1C1F27" oninput="setCSSVar('--bg-card', this.value); updateHex('hex-card', this.value)">
          </div>
        </div>
      </div>
      <div class="color-group">
        <div class="color-group-label">포인트 컬러</div>
        <div class="color-row">
          <span class="color-row-label">강조색</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-accent">#4A7CFF</span>
            <input type="color" id="pick-accent" value="#4A7CFF" oninput="applyAccent(this.value)">
          </div>
        </div>
      </div>
      <div class="color-group">
        <div class="color-group-label">텍스트</div>
        <div class="color-row">
          <span class="color-row-label">기본 텍스트</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-t1">#F2F4F8</span>
            <input type="color" id="pick-t1" value="#F2F4F8" oninput="setCSSVar('--text-1', this.value); updateHex('hex-t1', this.value)">
          </div>
        </div>
        <div class="color-row">
          <span class="color-row-label">보조 텍스트</span>
          <div class="color-input-wrap">
            <span class="color-hex" id="hex-t2">#8B90A0</span>
            <input type="color" id="pick-t2" value="#8B90A0" oninput="setCSSVar('--text-2', this.value); updateHex('hex-t2', this.value)">
          </div>
        </div>
      </div>
      <button class="reset-btn" onclick="resetAll()"><i class="ti ti-refresh"></i> 기본값으로 초기화</button>
    </div>

  </div>
</div>

<script>
  const app = document.getElementById('app');
  const presets = {
    toss:    { accent: '#4A7CFF', dim: '#1A2744', border: '#2A3C6A' },
    purple:  { accent: '#8B5CF6', dim: '#1E1433', border: '#3B2D6B' },
    emerald: { accent: '#10B981', dim: '#0D2720', border: '#1A4D3A' },
    amber:   { accent: '#F59E0B', dim: '#2A1F00', border: '#4A3800' },
    red:     { accent: '#EF4444', dim: '#2A0F0F', border: '#5A1F1F' },
    pink:    { accent: '#EC4899', dim: '#2A0F1F', border: '#5A1F3A' },
  };
  const defaults = {
    '--bg-base': '#0E0F12', '--bg-surface': '#13151A', '--bg-card': '#1C1F27',
    '--accent': '#4A7CFF', '--accent-dim': '#1A2744', '--accent-border': '#2A3C6A',
    '--text-1': '#F2F4F8', '--text-2': '#8B90A0',
  };
  function setCSSVar(k, v) { app.style.setProperty(k, v); }
  function updateHex(id, v) { document.getElementById(id).textContent = v.toUpperCase(); }
  function applyAccent(v) {
    setCSSVar('--accent', v);
    updateHex('hex-accent', v);
  }
  function applyPreset(name) {
    const p = presets[name];
    applyAccent(p.accent);
    setCSSVar('--accent-dim', p.dim);
    setCSSVar('--accent-border', p.border);
    document.querySelectorAll('.preset').forEach(el => { el.innerHTML = ''; el.style.borderColor = 'transparent'; });
    const sel = document.getElementById('preset-' + name);
    sel.innerHTML = '<i class="ti ti-check" style="font-size:14px;color:rgba(255,255,255,0.85)"></i>';
    sel.style.borderColor = '#fff';
  }
  function resetAll() {
    Object.entries(defaults).forEach(([k, v]) => app.style.setProperty(k, v));
    document.getElementById('pick-bg').value = '#0E0F12';
    document.getElementById('pick-surface').value = '#13151A';
    document.getElementById('pick-card').value = '#1C1F27';
    document.getElementById('pick-accent').value = '#4A7CFF';
    document.getElementById('pick-t1').value = '#F2F4F8';
    document.getElementById('pick-t2').value = '#8B90A0';
    updateHex('hex-bg','#0E0F12'); updateHex('hex-surface','#13151A');
    updateHex('hex-card','#1C1F27'); updateHex('hex-accent','#4A7CFF');
    updateHex('hex-t1','#F2F4F8'); updateHex('hex-t2','#8B90A0');
    applyPreset('toss');
  }
</script>
</body>
</html>
